<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>塾出席管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:  #4361ee;
      --present:  #2d9e5f;
      --absent:   #e63946;
      --late:     #e07c24;
      --early:    #4895ef;
      --bg:       #f0f4f8;
      --card:     #ffffff;
      --text:     #2b2d42;
      --muted:    #8d99ae;
      --border:   #dee2e6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: .02em; }

    /* ── タブ ── */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      flex: 1;
      min-width: 88px;
      padding: 13px 10px;
      border: none;
      background: none;
      font-size: .9rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── コンテンツ ── */
    .content {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── カード ── */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
    }
    .card-title {
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── フォーム ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
      appearance: none;
    }
    input[type="text"]:focus,
    input[type="date"]:focus,
    select:focus { outline: none; border-color: var(--primary); }

    /* 曜日チェック */
    .days-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .day-check { display: none; }
    .day-label {
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      font-weight: 800;
      font-size: .95rem;
      color: var(--muted);
      transition: all .15s;
      user-select: none;
    }
    .day-check:checked + .day-label {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* ── ボタン ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: filter .15s, opacity .15s;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(1.08); }
    .btn:active { filter: brightness(.95); }

    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-success  { background: var(--present); color: #fff; }
    .btn-danger   { background: var(--absent);  color: #fff; }
    .btn-outline  {
      background: #fff;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-sm { padding: 8px 14px; font-size: .82rem; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── 生徒リスト ── */
    .student-item {
      display: flex;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .student-item:last-child { border-bottom: none; }
    .student-info { flex: 1; min-width: 0; }
    .student-name { font-weight: 800; font-size: 1rem; }
    .student-days { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .day-badge {
      padding: 2px 9px;
      border-radius: 20px;
      background: #e8edff;
      color: var(--primary);
      font-size: .78rem;
      font-weight: 800;
    }
    .day-badge.sat { background: #e3f0ff; color: #1565c0; }
    .day-badge.sun { background: #fde8e8; color: var(--absent); }
    .student-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── 出席記録 ── */
    .date-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .date-row .form-group { margin-bottom: 0; flex: 1; min-width: 150px; }
    .date-row .today-btn { flex-shrink: 0; }

    .day-chip {
      padding: 11px 18px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      font-weight: 800;
      font-size: 1.05rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .attendance-row {
      display: flex;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    .attendance-row:last-child { border-bottom: none; }
    .att-name { font-weight: 800; font-size: 1rem; }

    .status-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-btn {
      padding: 10px 14px;
      border: 2px solid;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      background: #fff;
      transition: background .15s, color .15s;
      min-width: 58px;
      text-align: center;
    }
    .status-btn[data-s="出席"] { border-color: var(--present); color: var(--present); }
    .status-btn[data-s="欠席"] { border-color: var(--absent);  color: var(--absent);  }
    .status-btn[data-s="遅刻"] { border-color: var(--late);    color: var(--late);    }
    .status-btn[data-s="早退"] { border-color: var(--early);   color: var(--early);   }

    .status-btn.active[data-s="出席"] { background: var(--present); color: #fff; }
    .status-btn.active[data-s="欠席"] { background: var(--absent);  color: #fff; }
    .status-btn.active[data-s="遅刻"] { background: var(--late);    color: #fff; }
    .status-btn.active[data-s="早退"] { background: var(--early);   color: #fff; }

    /* ── レポート ── */
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-row .form-group { margin-bottom: 0; flex: 1; min-width: 130px; }

    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th, td { padding: 11px 10px; text-align: center; border-bottom: 1px solid var(--border); }
    th { background: #f6f8fb; font-weight: 800; font-size: .8rem; color: var(--muted); text-transform: uppercase; }
    td:first-child, th:first-child { text-align: left; }
    tr:hover td { background: #f6f8fb; }

    .rate-wrap { display: flex; align-items: center; gap: 8px; }
    .rate-bar { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; min-width: 40px; }
    .rate-fill { height: 100%; background: var(--present); border-radius: 4px; transition: width .4s; }
    .rate-pct  { font-size: .82rem; font-weight: 800; min-width: 34px; color: var(--present); }

    /* ── モーダル ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal .card-title { margin-bottom: 18px; }
    .modal-foot { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── トースト ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2b2d42;
      color: #fff;
      padding: 11px 22px;
      border-radius: 8px;
      font-weight: 700;
      font-size: .9rem;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── 空状態 ── */
    .empty {
      text-align: center;
      padding: 36px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .empty p { font-size: .9rem; }

    /* ── 今日タブ ── */
    .today-header-card {
      background: linear-gradient(135deg, #4361ee 0%, #6a82fb 100%);
      color: #fff;
      padding: 22px 20px 18px;
    }
    .today-date-label {
      font-size: .78rem;
      font-weight: 700;
      opacity: .8;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .today-date-str {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: .02em;
    }
    .today-progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .today-progress-bar {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,.3);
      border-radius: 4px;
      overflow: hidden;
    }
    .today-progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 4px;
      transition: width .4s ease;
    }
    .today-counter-text {
      font-size: .9rem;
      font-weight: 800;
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }
    .today-done-banner {
      text-align: center;
      padding: 28px 20px;
    }
    .today-done-icon { font-size: 3rem; margin-bottom: 8px; }
    .today-done-msg  { font-size: 1.1rem; font-weight: 800; color: var(--present); }
    .today-done-sub  { font-size: .85rem; color: var(--muted); margin-top: 4px; }

    /* 未記録強調 */
    .att-unrecorded { background: #fffbeb; }
    .att-unrecorded .att-name::after {
      content: '未記録';
      margin-left: 8px;
      font-size: .7rem;
      font-weight: 800;
      color: #92400e;
      background: #fde68a;
      padding: 1px 6px;
      border-radius: 10px;
      vertical-align: middle;
    }

    /* 時刻・メモ表示 */
    .att-name-wrap { flex: 1; min-width: 80px; }
    .att-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .att-meta-time {
      font-size: .78rem;
      font-weight: 800;
      color: var(--late);
      background: #fff4e6;
      padding: 1px 7px;
      border-radius: 10px;
    }
    .att-meta-memo {
      font-size: .78rem;
      color: var(--muted);
    }
    .btn-memo {
      padding: 3px 8px;
      font-size: .72rem;
      font-weight: 700;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      font-family: inherit;
    }
    .btn-memo:hover { border-color: var(--primary); color: var(--primary); }

    input[type="time"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 1.1rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
    }
    input[type="time"]:focus { outline: none; border-color: var(--primary); }

    /* ── バックアップバー ── */
    .backup-bar {
      background: #fffbeb;
      border-bottom: 2px solid #fcd34d;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 53px;
      z-index: 40;
    }
    .backup-info {
      flex: 1;
      min-width: 120px;
    }
    .backup-info .bi-label {
      font-size: .72rem;
      font-weight: 700;
      color: #92400e;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .backup-info .bi-time {
      font-size: .85rem;
      font-weight: 800;
    }
    .bi-time.ok   { color: #15803d; }
    .bi-time.warn { color: #dc2626; }
    .backup-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-backup  { background: #d97706; color: #fff; }
    .btn-restore { background: #0284c7; color: #fff; }

    /* ── レスポンシブ ── */
    @media (max-width: 560px) {
      .header h1 { font-size: 1.05rem; }
      .tab-btn  { font-size: .78rem; padding: 12px 6px; min-width: 72px; }
      .status-btn { padding: 9px 10px; font-size: .78rem; min-width: 50px; }
    }
  </style>
</head>
<body>

<header class="header">
  <span style="font-size:1.5rem">📚</span>
  <h1>塾出席管理</h1>
</header>

<!-- ── バックアップバー ── -->
<div class="backup-bar">
  <div class="backup-info">
    <div class="bi-label">💾 データバックアップ</div>
    <div class="bi-time warn" id="last-backup-info">未バックアップ</div>
  </div>
  <div class="backup-actions">
    <button class="btn btn-backup btn-sm" onclick="backupData()">保存する</button>
    <button class="btn btn-restore btn-sm" onclick="triggerRestore()">復元する</button>
  </div>
</div>
<input type="file" id="restore-input" accept=".json" style="display:none" onchange="handleRestoreFile(event)">

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab(this,'today')">📅 今日</button>
  <button class="tab-btn" onclick="switchTab(this,'attendance')">📋 出席記録</button>
  <button class="tab-btn" onclick="switchTab(this,'students')">👤 生徒管理</button>
  <button class="tab-btn" onclick="switchTab(this,'report')">📊 集計</button>
</nav>

<div class="content">

  <!-- ── 今日タブ ── -->
  <div id="tab-today" class="tab-panel active">

    <div class="card today-header-card">
      <div class="today-date-label">TODAY</div>
      <div class="today-date-str" id="today-date-str">---</div>
      <div class="today-progress-wrap">
        <div class="today-progress-bar">
          <div class="today-progress-fill" id="today-progress-fill" style="width:0%"></div>
        </div>
        <div class="today-counter-text" id="today-counter-text">0 / 0 名</div>
      </div>
    </div>

    <div class="card" id="today-card">
      <div id="today-list"></div>
    </div>

  </div>

  <!-- ── 生徒管理 ── -->
  <div id="tab-students" class="tab-panel">

    <div class="card">
      <div class="card-title">➕ 生徒を登録する</div>
      <div class="form-group">
        <label>生徒名</label>
        <input type="text" id="s-name" placeholder="例：田中 花子" />
      </div>
      <div class="form-group">
        <label>登塾曜日（複数選択OK）</label>
        <div class="days-grid" id="s-days"></div>
      </div>
      <button class="btn btn-primary btn-full" onclick="addStudent()">登録する</button>
    </div>

    <div class="card">
      <div class="card-title">👥 登録済み生徒</div>
      <div id="student-list"></div>
    </div>

  </div>

  <!-- ── 出席記録 ── -->
  <div id="tab-attendance" class="tab-panel">
    <div class="card">
      <div class="date-row">
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="att-date" onchange="renderAtt()" />
        </div>
        <button class="btn btn-outline today-btn" onclick="setToday()">今日</button>
        <div class="day-chip" id="att-day">---</div>
      </div>
      <div id="att-list"></div>
    </div>
  </div>

  <!-- ── 集計レポート ── -->
  <div id="tab-report" class="tab-panel">
    <div class="card">
      <div class="card-title">🔍 絞り込み</div>
      <div class="filter-row">
        <div class="form-group">
          <label>開始日</label>
          <input type="date" id="r-start" onchange="renderReport()" />
        </div>
        <div class="form-group">
          <label>終了日</label>
          <input type="date" id="r-end" onchange="renderReport()" />
        </div>
        <div class="form-group">
          <label>曜日</label>
          <select id="r-day" onchange="renderReport()"></select>
        </div>
      </div>
      <button class="btn btn-success btn-full" onclick="exportCSV()" style="margin-bottom:16px;">📥 CSVダウンロード</button>
      <div class="table-wrap"><div id="report-table"></div></div>
    </div>
  </div>

</div><!-- /content -->

<!-- ── 編集モーダル ── -->
<div class="overlay" id="edit-modal">
  <div class="modal">
    <div class="card-title">✏️ 生徒情報を編集</div>
    <input type="hidden" id="e-id" />
    <div class="form-group">
      <label>生徒名</label>
      <input type="text" id="e-name" />
    </div>
    <div class="form-group">
      <label>登塾曜日</label>
      <div class="days-grid" id="e-days"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<!-- ── 時刻＆メモ モーダル ── -->
<div class="overlay" id="timememo-modal">
  <div class="modal" style="max-width:380px">
    <div class="card-title" id="timememo-title">⏰ 遅刻の記録</div>
    <div style="font-weight:800;font-size:1rem;margin-bottom:16px;color:var(--primary)" id="timememo-name"></div>
    <div class="form-group" id="timememo-time-group">
      <label>時刻（自動入力・修正可）</label>
      <input type="time" id="timememo-time" />
    </div>
    <div class="form-group">
      <label>メモ（任意）</label>
      <input type="text" id="timememo-memo" placeholder="例：体調不良、振替希望" maxlength="50" />
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="skipTimeMemo()">時刻なしで保存</button>
      <button class="btn btn-primary" onclick="saveTimeMemo()">保存する</button>
    </div>
  </div>
</div>

<!-- ── 復元確認モーダル ── -->
<div class="overlay" id="restore-modal">
  <div class="modal">
    <div class="card-title">📂 データを復元しますか？</div>
    <p style="margin-bottom:12px;font-size:.95rem;line-height:1.6;">
      バックアップファイルから以下のデータを読み込みます。<br>
      <strong>現在のデータはすべて上書きされます。</strong>
    </p>
    <div style="background:#f0f4f8;border-radius:8px;padding:14px;margin-bottom:8px;font-size:.9rem;">
      <div id="restore-preview">—</div>
    </div>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:4px;">
      エクスポート日時: <span id="restore-exported-at">—</span>
    </p>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeRestoreModal()">キャンセル</button>
      <button class="btn btn-restore" onclick="confirmRestore()">復元する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════
//  定数
// ════════════════════════════
const SK  = 'juku_students';
const AK  = 'juku_attendance';
const LBK = 'juku_last_backup';
const DAYS    = ['月','火','水','木','金','土','日'];
const STATUSES = ['出席','欠席','遅刻','早退'];

// ════════════════════════════
//  データアクセス
// ════════════════════════════
const getStudents   = () => JSON.parse(localStorage.getItem(SK) || '[]');
const saveStudents  = v  => localStorage.setItem(SK, JSON.stringify(v));
const getAttendance = () => JSON.parse(localStorage.getItem(AK) || '[]');
const saveAttendance= v  => localStorage.setItem(AK, JSON.stringify(v));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

// ════════════════════════════
//  ユーティリティ
// ════════════════════════════
const todayStr = () => new Date().toISOString().slice(0, 10);

function dayIdx(dateStr) {
  // 0=月 … 6=日
  return (new Date(dateStr + 'T00:00:00').getDay() + 6) % 7;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ════════════════════════════
//  バックアップ＆復元
// ════════════════════════════
function updateBackupInfo() {
  const ts  = localStorage.getItem(LBK);
  const el  = document.getElementById('last-backup-info');
  if (!ts) {
    el.textContent = 'まだバックアップされていません — 今すぐ保存を！';
    el.className = 'bi-time warn';
  } else {
    const d   = new Date(ts);
    const now = new Date();
    const diffDays = Math.floor((now - d) / 86400000);
    const fmt = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} `
              + `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const age = diffDays === 0 ? '今日' : diffDays === 1 ? '昨日' : `${diffDays}日前`;
    el.textContent = `最終バックアップ: ${fmt}（${age}）`;
    el.className = diffDays >= 3 ? 'bi-time warn' : 'bi-time ok';
  }
}

function backupData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    students:   getStudents(),
    attendance: getAttendance()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `塾出席バックアップ_${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem(LBK, new Date().toISOString());
  updateBackupInfo();
  toast('💾 バックアップを保存しました');
}

function triggerRestore() {
  document.getElementById('restore-input').click();
}

function handleRestoreFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.students) || !Array.isArray(data.attendance)) {
        toast('⚠️ ファイルの形式が正しくありません');
        return;
      }
      window._pendingRestore = data;
      document.getElementById('restore-preview').innerHTML =
        `<strong>生徒: ${data.students.length}人</strong> ／ 出席記録: ${data.attendance.length}件`;
      const expAt = data.exportedAt
        ? new Date(data.exportedAt).toLocaleString('ja-JP') : '不明';
      document.getElementById('restore-exported-at').textContent = expAt;
      document.getElementById('restore-modal').classList.add('open');
    } catch {
      toast('⚠️ ファイルの読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function closeRestoreModal() {
  window._pendingRestore = null;
  document.getElementById('restore-modal').classList.remove('open');
}

function confirmRestore() {
  const data = window._pendingRestore;
  if (!data) return;
  saveStudents(data.students);
  saveAttendance(data.attendance);
  closeRestoreModal();
  renderStudents();
  renderAtt();
  renderReport();
  updateBackupInfo();
  toast('✅ データを復元しました');
}

// ════════════════════════════
//  タブ切り替え
// ════════════════════════════
function switchTab(btn, name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'today')      renderToday();
  if (name === 'attendance') renderAtt();
  if (name === 'report')     renderReport();
}

// ════════════════════════════
//  今日タブ
// ════════════════════════════
function renderToday() {
  const today = todayStr();
  const di    = dayIdx(today);
  const d     = new Date(today + 'T00:00:00');
  const dateStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DAYS[di]}曜日）`;
  document.getElementById('today-date-str').textContent = dateStr;

  const allStudents = getStudents().filter(s => s.days.includes(di));
  const att         = getAttendance();

  const total    = allStudents.length;
  const recorded = allStudents.filter(s => att.some(a => a.date === today && a.studentId === s.id));
  const doneCount = recorded.length;

  // プログレス更新
  const pct = total ? Math.round(doneCount / total * 100) : 0;
  document.getElementById('today-progress-fill').style.width = pct + '%';
  document.getElementById('today-counter-text').textContent  = `${doneCount} / ${total} 名`;

  const listEl = document.getElementById('today-list');

  if (!total) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>${DAYS[di]}曜日に登録されている生徒がいません</p></div>`;
    return;
  }

  if (doneCount === total) {
    listEl.innerHTML = `
      <div class="today-done-banner">
        <div class="today-done-icon">🎉</div>
        <div class="today-done-msg">全員の記録が完了しました！</div>
        <div class="today-done-sub">${total}名全員 — お疲れさまでした</div>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:0 0 12px;">
      ${buildAttRows(allStudents, att, today)}`;
    return;
  }

  // 未記録を先頭に、記録済みを後ろに
  const unrecorded = allStudents.filter(s => !att.some(a => a.date === today && a.studentId === s.id));
  const done       = allStudents.filter(s =>  att.some(a => a.date === today && a.studentId === s.id));
  listEl.innerHTML = buildAttRows([...unrecorded, ...done], att, today, 'today');
}

function buildAttRows(students, att, date, context) {
  return students.map(s => {
    const rec     = att.find(a => a.date === date && a.studentId === s.id);
    const current = rec ? rec.status : null;
    const isUnrec = !current;

    // 時刻・メモ表示
    let metaHtml = '';
    if (rec) {
      const timePart = rec.time
        ? `<span class="att-meta-time">⏰ ${rec.time}</span>` : '';
      const memoPart = rec.memo
        ? `<span class="att-meta-memo">📝 ${esc(rec.memo)}</span>` : '';
      const editBtn  = `<button class="btn-memo" onclick="openMemoModal('${s.id}','${date}','${context||'att'}')">メモ編集</button>`;
      if (timePart || memoPart) {
        metaHtml = `<div class="att-meta">${timePart}${memoPart}${editBtn}</div>`;
      } else {
        metaHtml = `<div class="att-meta">${editBtn}</div>`;
      }
    }

    const btns = STATUSES.map(st => `
      <button class="status-btn ${current === st ? 'active' : ''}" data-s="${st}"
        onclick="recordAttCtx('${s.id}','${date}','${st}','${context||'att'}')">${st}</button>
    `).join('');

    return `
      <div class="attendance-row ${isUnrec ? 'att-unrecorded' : ''}">
        <div class="att-name-wrap">
          <div class="att-name">${esc(s.name)}</div>
          ${metaHtml}
        </div>
        <div class="status-buttons">${btns}</div>
      </div>`;
  }).join('');
}

// ── 時刻＆メモモーダル ──
let _tmCtx = null;

function recordAttCtx(studentId, date, status, context) {
  let att = getAttendance();
  const idx = att.findIndex(a => a.date === date && a.studentId === studentId);

  // 同じボタン → 解除
  if (idx >= 0 && att[idx].status === status) {
    att.splice(idx, 1);
    saveAttendance(att);
    _refresh(context);
    return;
  }

  // 遅刻・早退 → 時刻モーダル
  if (status === '遅刻' || status === '早退') {
    const existing = att[idx] || null;
    openTimeMemoModal(studentId, date, status, context, existing);
    return;
  }

  // 出席・欠席 → 即記録（メモは保持）
  const existingMemo = idx >= 0 ? att[idx].memo : undefined;
  if (idx >= 0) {
    att[idx].status = status;
    att[idx].time   = undefined;
    att[idx].memo   = existingMemo;
  } else {
    att.push({ id: uid(), date, studentId, status });
  }
  saveAttendance(att);
  _refresh(context);
}

function openTimeMemoModal(studentId, date, status, context, existing) {
  _tmCtx = { studentId, date, status, context };
  const student = getStudents().find(s => s.id === studentId);
  const now = new Date();
  const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('timememo-title').textContent =
    status === '遅刻' ? '⏰ 遅刻の記録' : '🏃 早退の記録';
  document.getElementById('timememo-name').textContent = student ? student.name : '';
  document.getElementById('timememo-time').value = existing?.time || nowTime;
  document.getElementById('timememo-memo').value = existing?.memo || '';
  document.getElementById('timememo-modal').classList.add('open');
  setTimeout(() => document.getElementById('timememo-memo').focus(), 100);
}

function openMemoModal(studentId, date, context) {
  const att = getAttendance();
  const rec = att.find(a => a.date === date && a.studentId === studentId);
  if (!rec) return;
  openTimeMemoModal(studentId, date, rec.status, context, rec);
  document.getElementById('timememo-time-group').style.display =
    (rec.status === '遅刻' || rec.status === '早退') ? '' : 'none';
}

function _doSaveTimeMemo(includeTime) {
  if (!_tmCtx) return;
  const { studentId, date, status, context } = _tmCtx;
  const time = includeTime ? document.getElementById('timememo-time').value : undefined;
  const memo = document.getElementById('timememo-memo').value.trim() || undefined;

  let att = getAttendance();
  const idx = att.findIndex(a => a.date === date && a.studentId === studentId);
  if (idx >= 0) {
    att[idx].status = status;
    att[idx].time   = time;
    att[idx].memo   = memo;
  } else {
    att.push({ id: uid(), date, studentId, status, time, memo });
  }
  saveAttendance(att);
  document.getElementById('timememo-modal').classList.remove('open');
  document.getElementById('timememo-time-group').style.display = '';
  _tmCtx = null;
  _refresh(context);
}

function saveTimeMemo()  { _doSaveTimeMemo(true);  }
function skipTimeMemo()  { _doSaveTimeMemo(false); }

function _refresh(context) {
  if (context === 'today') renderToday();
  else renderAtt();
}

// ════════════════════════════
//  曜日チェックボックス生成
// ════════════════════════════
function buildDays(containerId, prefix, checked = []) {
  const el = document.getElementById(containerId);
  el.innerHTML = DAYS.map((d, i) => `
    <input type="checkbox" class="day-check" id="${prefix}-d${i}" value="${i}" ${checked.includes(i) ? 'checked' : ''}>
    <label class="day-label" for="${prefix}-d${i}">${d}</label>
  `).join('');
}

function checkedDays(prefix) {
  return DAYS.map((_, i) => {
    const cb = document.getElementById(`${prefix}-d${i}`);
    return cb && cb.checked ? i : null;
  }).filter(v => v !== null);
}

// ════════════════════════════
//  生徒管理
// ════════════════════════════
function renderStudents() {
  const list = getStudents();
  const el   = document.getElementById('student-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">👤</div><p>まだ生徒が登録されていません</p></div>`;
    return;
  }
  el.innerHTML = list.map(s => {
    const badges = s.days.slice().sort((a,b)=>a-b).map(d => {
      const cls = d === 5 ? 'sat' : d === 6 ? 'sun' : '';
      return `<span class="day-badge ${cls}">${DAYS[d]}</span>`;
    }).join('');
    return `
      <div class="student-item">
        <div class="student-info">
          <div class="student-name">${esc(s.name)}</div>
          <div class="student-days">${badges}</div>
        </div>
        <div class="student-actions">
          <button class="btn btn-outline btn-sm" onclick="openEdit('${s.id}')">✏️ 編集</button>
          <button class="btn btn-danger  btn-sm" onclick="deleteStudent('${s.id}')">🗑 削除</button>
        </div>
      </div>`;
  }).join('');
}

function addStudent() {
  const name = document.getElementById('s-name').value.trim();
  if (!name) { toast('生徒名を入力してください'); return; }
  const days = checkedDays('s');
  if (!days.length) { toast('曜日を1つ以上選んでください'); return; }
  const students = getStudents();
  students.push({ id: uid(), name, days });
  saveStudents(students);
  document.getElementById('s-name').value = '';
  buildDays('s-days', 's');
  renderStudents();
  toast(`「${name}」を登録しました`);
}

function deleteStudent(id) {
  const s = getStudents().find(x => x.id === id);
  if (!s || !confirm(`「${s.name}」を削除しますか？\n出席記録も一緒に削除されます。`)) return;
  saveStudents(getStudents().filter(x => x.id !== id));
  saveAttendance(getAttendance().filter(a => a.studentId !== id));
  renderStudents();
  toast(`「${s.name}」を削除しました`);
}

function openEdit(id) {
  const s = getStudents().find(x => x.id === id);
  if (!s) return;
  document.getElementById('e-id').value  = id;
  document.getElementById('e-name').value = s.name;
  buildDays('e-days', 'e', s.days);
  document.getElementById('edit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
}

function saveEdit() {
  const id   = document.getElementById('e-id').value;
  const name = document.getElementById('e-name').value.trim();
  if (!name) { toast('生徒名を入力してください'); return; }
  const days = checkedDays('e');
  if (!days.length) { toast('曜日を1つ以上選んでください'); return; }
  const students = getStudents();
  const idx = students.findIndex(s => s.id === id);
  if (idx >= 0) { students[idx].name = name; students[idx].days = days; saveStudents(students); }
  closeModal();
  renderStudents();
  toast('生徒情報を更新しました');
}

// ════════════════════════════
//  出席記録
// ════════════════════════════
function setToday() {
  document.getElementById('att-date').value = todayStr();
  renderAtt();
}

function renderAtt() {
  const date = document.getElementById('att-date').value;
  const dayEl = document.getElementById('att-day');
  const listEl = document.getElementById('att-list');

  if (!date) {
    dayEl.textContent = '---';
    listEl.innerHTML = `<div class="empty"><p>日付を選択してください</p></div>`;
    return;
  }

  const di = dayIdx(date);
  dayEl.textContent = DAYS[di] + '曜日';

  const students  = getStudents().filter(s => s.days.includes(di));
  const attendance = getAttendance();

  if (!students.length) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>${DAYS[di]}曜日に登録されている生徒がいません</p></div>`;
    return;
  }

  listEl.innerHTML = buildAttRows(students, attendance, date, 'att');
}

function recordAtt(studentId, date, status) {
  recordAttCtx(studentId, date, status, 'att');
}

// 時刻モーダルのEnterキー保存
document.getElementById('timememo-memo').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveTimeMemo();
});

// ════════════════════════════
//  集計レポート
// ════════════════════════════
function renderReport() {
  const startStr = document.getElementById('r-start').value;
  const endStr   = document.getElementById('r-end').value;
  const dayFilter= document.getElementById('r-day').value;

  const students = getStudents();
  let att = getAttendance();
  if (startStr)       att = att.filter(a => a.date >= startStr);
  if (endStr)         att = att.filter(a => a.date <= endStr);
  if (dayFilter !== '') att = att.filter(a => dayIdx(a.date) === +dayFilter);

  const el = document.getElementById('report-table');
  if (!students.length) {
    el.innerHTML = `<div class="empty"><p>生徒が登録されていません</p></div>`;
    return;
  }

  const rows = students.map(s => {
    const recs = att.filter(a => a.studentId === s.id);
    const cnt  = Object.fromEntries(STATUSES.map(st => [st, 0]));
    recs.forEach(r => { if (cnt[r.status] !== undefined) cnt[r.status]++; });
    const total = Object.values(cnt).reduce((a,b) => a+b, 0);
    const rate  = total ? Math.round(cnt['出席'] / total * 100) : 0;
    return { s, cnt, total, rate };
  });

  el.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>生徒名</th>
          <th style="color:var(--present)">出席</th>
          <th style="color:var(--absent)">欠席</th>
          <th style="color:var(--late)">遅刻</th>
          <th style="color:var(--early)">早退</th>
          <th>合計</th>
          <th>出席率</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td><strong>${esc(r.s.name)}</strong></td>
            <td style="color:var(--present);font-weight:800">${r.cnt['出席']}</td>
            <td style="color:var(--absent);font-weight:800">${r.cnt['欠席']}</td>
            <td style="color:var(--late);font-weight:800">${r.cnt['遅刻']}</td>
            <td style="color:var(--early);font-weight:800">${r.cnt['早退']}</td>
            <td>${r.total}</td>
            <td>
              <div class="rate-wrap">
                <div class="rate-bar"><div class="rate-fill" style="width:${r.rate}%"></div></div>
                <span class="rate-pct">${r.rate}%</span>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

// ════════════════════════════
//  CSV エクスポート
// ════════════════════════════
function exportCSV() {
  const startStr = document.getElementById('r-start').value;
  const endStr   = document.getElementById('r-end').value;
  const dayFilter= document.getElementById('r-day').value;

  const sMap = Object.fromEntries(getStudents().map(s => [s.id, s.name]));
  let att = getAttendance();
  if (startStr)       att = att.filter(a => a.date >= startStr);
  if (endStr)         att = att.filter(a => a.date <= endStr);
  if (dayFilter !== '') att = att.filter(a => dayIdx(a.date) === +dayFilter);

  att.sort((a,b) => a.date.localeCompare(b.date) ||
    (sMap[a.studentId]||'').localeCompare(sMap[b.studentId]||''));

  const header = ['日付','曜日','生徒名','ステータス','時刻','メモ'];
  const rows   = att.map(a => [
    a.date,
    DAYS[dayIdx(a.date)] + '曜日',
    sMap[a.studentId] || '（削除済み）',
    a.status,
    a.time  || '',
    a.memo  || ''
  ]);

  const csv  = [header, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `出席記録_${todayStr()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSVをダウンロードしました');
}

// ════════════════════════════
//  初期化
// ════════════════════════════
function init() {
  // 生徒登録フォームの曜日
  buildDays('s-days', 's');

  // 曜日フィルタ select
  const sel = document.getElementById('r-day');
  sel.innerHTML = '<option value="">すべての曜日</option>' +
    DAYS.map((d,i) => `<option value="${i}">${d}曜日</option>`).join('');

  // デフォルト日付
  const today = todayStr();
  document.getElementById('att-date').value = today;

  // 今月の範囲
  const first = today.slice(0,8) + '01';
  document.getElementById('r-start').value = first;
  document.getElementById('r-end').value   = today;

  updateBackupInfo();
  renderStudents();
  renderToday();
}

// モーダル背景クリックで閉じる
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('restore-modal').addEventListener('click', function(e) {
  if (e.target === this) closeRestoreModal();
});
document.getElementById('timememo-modal').addEventListener('click', function(e) {
  if (e.target === this) {
    document.getElementById('timememo-modal').classList.remove('open');
    document.getElementById('timememo-time-group').style.display = '';
    _tmCtx = null;
  }
});

// Enterキーで登録
document.getElementById('s-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStudent();
});
document.getElementById('e-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveEdit();
});

init();
